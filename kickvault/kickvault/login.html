<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — KickVault</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a href="index.html" class="logo">KICK<span>VAULT</span></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="browse.html">Browse</a>
      </div>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card" id="authCard">
      <div class="auth-logo">KICK<span>VAULT</span></div>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuth('login')">Sign In</button>
        <button class="auth-tab" onclick="switchAuth('register')">Register</button>
      </div>

      <div id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="john@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPass" placeholder="••••••••" />
        </div>
        <button class="btn-primary" style="width:100%" onclick="doLogin()">Sign In</button>
        <a href="#" class="auth-link">Forgot your password?</a>
      </div>

      <div id="registerForm" style="display:none">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="regName" placeholder="John Smith" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="john@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPass" placeholder="••••••••" />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="regPass2" placeholder="••••••••" />
        </div>
        <button class="btn-primary" style="width:100%" onclick="doRegister()">Create Account</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
  <script>
    function switchAuth(mode) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('loginForm').style.display = mode === 'login' ? '' : 'none';
      document.getElementById('registerForm').style.display = mode === 'register' ? '' : 'none';
    }
    function doLogin() {
      showToast('Welcome back! Redirecting...');
      setTimeout(() => window.location.href='index.html', 1500);
    }
    function doRegister() {
      showToast('Account created! Welcome to KickVault 🎉');
      setTimeout(() => window.location.href='index.html', 1500);
    }
  </script>
</body>
</html>
